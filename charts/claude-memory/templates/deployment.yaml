apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-memory.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-memory.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "claude-memory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-memory.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: claude-memory
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_PORT
              value: "8080"
            - name: BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: BEARER_TOKEN
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-memory.fullname" . }}-pg-app
                  key: password
            - name: DATABASE_URL
              value: "postgresql://mem0:$(DB_PASSWORD)@{{ include "claude-memory.fullname" . }}-pg-rw:5432/mem0"
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
            - name: OLLAMA_EMBED_MODEL
              value: {{ .Values.ollama.embedModel | quote }}
            - name: MEM0_USER_ID
              value: {{ .Values.mem0.userId | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
