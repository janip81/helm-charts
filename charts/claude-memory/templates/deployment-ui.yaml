{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-memory.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "claude-memory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "claude-memory.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: claude-memory-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "src/ui/app.py"]
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgresql://mem0:$(DB_PASSWORD)@{{ include "claude-memory.fullname" . }}-pg-rw:5432/mem0"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-memory.fullname" . }}-pg-app
                  key: password
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
            - name: OLLAMA_EMBED_MODEL
              value: {{ .Values.ollama.embedModel | quote }}
            - name: MEM0_USER_ID
              value: {{ .Values.mem0.userId | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
{{- end }}
