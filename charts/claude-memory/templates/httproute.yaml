{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "claude-memory.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-memory.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostnames:
    - {{ .Values.gatewayApi.host | quote }}
  parentRefs:
  {{- range .Values.gatewayApi.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      group: gateway.networking.k8s.io
      kind: Gateway
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "claude-memory.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
---
{{- if and .Values.ui.enabled .Values.ui.host }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "claude-memory.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostnames:
    - {{ .Values.ui.host | quote }}
  parentRefs:
  {{- range .Values.gatewayApi.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      group: gateway.networking.k8s.io
      kind: Gateway
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "claude-memory.fullname" . }}-ui
          port: {{ .Values.ui.port }}
          weight: 1
{{- end }}
{{- end }}
