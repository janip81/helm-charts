{{- if .Values.secrets.create }}
{{- $ns := .Release.Namespace }}
{{- $enc := .Values.secrets.encryption }}
{{- $existingEnc := lookup "v1" "Secret" $ns $enc.name }}
{{- $encVal := "" }}
{{- if $enc.value | default "" | trim | ne "" }}
  {{- $encVal = $enc.value }}
{{- else if and $existingEnc (index $existingEnc.data $enc.key) }}
  {{- $encVal = (index $existingEnc.data $enc.key) | b64dec }}
{{- else }}
  {{- $encVal = randAlphaNum 64 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $enc.name }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
  {{- with $enc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
{{- if .Values.secrets.useStringData }}
stringData:
  {{ $enc.key }}: {{ $encVal | quote }}
{{- else }}
data:
  {{ $enc.key }}: {{ $encVal | b64enc }}
{{- end }}
{{- $db := .Values.secrets.database }}
{{- $existingDb := lookup "v1" "Secret" $ns $db.name }}
{{- $dbVal := "" }}
{{- if $db.value | default "" | trim | ne "" }}
  {{- $dbVal = $db.value }}
{{- else if and $existingDb (index $existingDb.data $db.key) }}
  {{- $dbVal = (index $existingDb.data $db.key) | b64dec }}
{{- else }}
  {{- $dbVal = randAlphaNum 24 }}
{{- end }}
{{- $dbUserVal := "" }}
{{- if $db.userKey }}
  {{- if $db.userValue | default "" | trim | ne "" }}
    {{- $dbUserVal = $db.userValue }}
  {{- else if and $existingDb (index $existingDb.data $db.userKey) }}
    {{- $dbUserVal = (index $existingDb.data $db.userKey) | b64dec }}
  {{- else }}
    {{- $dbUserVal = "n8n" }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $db.name }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
  {{- with $db.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
{{- if .Values.secrets.useStringData }}
stringData:
  {{ $db.key }}: {{ $dbVal | quote }}
  {{- if $db.userKey }}
  {{ $db.userKey }}: {{ $dbUserVal | quote }}
  {{- end }}
{{- else }}
data:
  {{ $db.key }}: {{ $dbVal | b64enc }}
  {{- if $db.userKey }}
  {{ $db.userKey }}: {{ $dbUserVal | b64enc }}
  {{- end }}
{{- end }}
{{- end }}
