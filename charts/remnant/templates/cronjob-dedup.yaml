{{- if .Values.dedup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "remnant.fullname" . }}-dedup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "remnant.labels" . | nindent 4 }}
    app.kubernetes.io/component: dedup
spec:
  schedule: {{ .Values.dedup.schedule | quote }}
  suspend: {{ .Values.dedup.suspend }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "remnant.labels" . | nindent 12 }}
            app.kubernetes.io/component: dedup
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initContainers:
            - name: wait-for-db
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - -c
                - |
                  import os, time, psycopg2
                  url = os.environ["DATABASE_URL"]
                  for i in range(30):
                      try:
                          psycopg2.connect(url).close()
                          print("DB ready")
                          break
                      except Exception as e:
                          print(f"Waiting for DB ({i+1}/30): {e}")
                          time.sleep(5)
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "remnant.fullname" . }}-pg-app
                      key: password
                - name: DATABASE_URL
                  value: "postgresql://mem0:$(DB_PASSWORD)@{{ include "remnant.fullname" . }}-pg-rw:5432/mem0"
          containers:
            - name: dedup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - src/scripts/dedup_job.py
                - --threshold
                - {{ .Values.dedup.semanticThreshold | quote }}
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "remnant.fullname" . }}-pg-app
                      key: password
                - name: DATABASE_URL
                  value: "postgresql://mem0:$(DB_PASSWORD)@{{ include "remnant.fullname" . }}-pg-rw:5432/mem0"
                - name: OLLAMA_BASE_URL
                  value: {{ .Values.ollama.baseUrl | quote }}
                - name: OLLAMA_MODEL
                  value: {{ .Values.ollama.model | quote }}
                - name: CLAUDE_MEMORY_URL
                  value: "http://{{ include "remnant.fullname" . }}:{{ .Values.service.port }}"
                - name: CLAUDE_MEMORY_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.auth.secretName }}
                      key: BEARER_TOKEN
              resources:
                {{- toYaml .Values.dedup.resources | nindent 16 }}
{{- end }}
