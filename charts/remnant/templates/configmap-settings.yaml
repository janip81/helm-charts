apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "remnant.fullname" . }}-settings
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "remnant.labels" . | nindent 4 }}
data:
  TAGGING_MODE: {{ .Values.tagging.mode | quote }}
  TAGGING_LLM_MODEL: {{ .Values.tagging.llmModel | default "" | quote }}
