apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnant.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "remnant.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "remnant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "remnant.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: remnant
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "remnant.fullname" . }}-settings
          env:
            - name: APP_PORT
              value: "8080"
            - name: BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: BEARER_TOKEN
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "remnant.fullname" . }}-pg-app
                  key: password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.cnpg.owner | default "remnant" }}:$(DB_PASSWORD)@{{ include "remnant.fullname" . }}-pg-rw:5432/{{ .Values.cnpg.database | default "remnant" }}"
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
            - name: OLLAMA_EMBED_MODEL
              value: {{ .Values.ollama.embedModel | quote }}
            - name: MEM0_USER_ID
              value: {{ .Values.mem0.userId | quote }}
            - name: MEM0_AGENT_ID
              value: {{ .Values.mem0.agentId | quote }}
            - name: MEM0_INFER
              value: {{ .Values.mem0.infer | quote }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.passwordSecret.name }}
                  key: {{ .Values.redis.passwordSecret.key }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.redis.host }}:{{ .Values.redis.port }}/{{ .Values.redis.db }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
