apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unifi-network-application.fullname" . }}
  labels:
    {{- include "unifi-network-application.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "unifi-network-application.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "unifi-network-application.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-mongodb
          image: busybox
          command: ['sh', '-c', 'until nc -z {{ include "unifi-network-application.fullname" . }}-mongodb 27017; do echo "waiting for mongodb..."; sleep 2; done']
      containers:
        - name: unifi-network-application
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
            - name: controller
              containerPort: 8080
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
            - name: discovery
              containerPort: 10001
              protocol: UDP
            - name: speedtest
              containerPort: 6789
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: PUID
              value: {{ .Values.env.PUID | quote }}
            - name: PGID
              value: {{ .Values.env.PGID | quote }}
            - name: MONGO_HOST
              value: {{ include "unifi-network-application.fullname" . }}-mongodb
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_DBNAME
              value: "unifi"
            - name: MONGO_USER
              value: {{ .Values.mongodb.auth.username | quote }}
            - name: MONGO_PASS
              value: {{ .Values.mongodb.auth.password | quote }}
            - name: MONGO_AUTHSOURCE
              value: "admin"
            {{- if .Values.tls.secretName }}
            - name: CERTFILE
              value: /certs/tls.crt
            - name: KEYFILE
              value: /certs/tls.key
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
            {{- if .Values.tls.secretName }}
            - name: tls-cert
              mountPath: /certs
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /status
              port: 8443
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /status
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "unifi-network-application.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.tls.secretName }}
        - name: tls-cert
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
