apiVersion: apps/v1
kind: Deployment
metadata:
  name: castlist-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: castlist-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: castlist-api
  template:
    metadata:
      labels:
        app: castlist-api
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: castlist-config
            - secretRef:
                name: castlist-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
