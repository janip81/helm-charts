apiVersion: v1
kind: ConfigMap
metadata:
  name: castlist-config
  namespace: {{ .Values.namespace }}
data:
  KEYCLOAK_URL: {{ .Values.config.keycloakUrl | quote }}
  KEYCLOAK_REALM: {{ .Values.config.keycloakRealm | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.config.keycloakClientId | quote }}
  CHROMECAST_FRIENDLY_NAME: {{ .Values.config.chromecastFriendlyName | quote }}
  QUEUE_BACKEND: {{ .Values.config.queueBackend | quote }}
  # Used by the frontend nginx entrypoint to proxy to the correct API service
  API_BACKEND_URL: {{ printf "http://castlist-api:%d" (.Values.api.port | int) | quote }}
