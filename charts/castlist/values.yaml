# -- Image pull secret name for GHCR (kubernetes.io/dockerconfigjson)
imagePullSecret: ""

api:
  image:
    # -- API container image repository
    repository: ghcr.io/janip81/castlist-api
    # -- Image tag
    tag: "latest"
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Number of API replicas
  replicas: 1
  # -- API container port
  port: 8000
  # -- Resource requests and limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

frontend:
  image:
    # -- Frontend container image repository
    repository: ghcr.io/janip81/castlist-frontend
    # -- Image tag
    tag: "latest"
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Number of frontend replicas
  replicas: 1
  # -- Frontend container port
  port: 80
  # -- Resource requests and limits
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# -- Gateway API HTTPRoute settings
gateway:
  # -- Gateway name
  name: internal-shared
  # -- Gateway namespace
  namespace: kube-system
  # -- Hostname for castlist
  hostname: castlist.prod.threshold.se

config:
  # -- Keycloak base URL
  keycloakUrl: ""
  # -- Keycloak realm name
  keycloakRealm: ""
  # -- Keycloak client ID (public client — no secret required)
  keycloakClientId: "castlist"
  # -- Queue backend (`memory` or `redis`)
  queueBackend: "memory"
  # -- Chromecast devices — list of name/ip pairs
  # @default -- `[]`
  chromecasts: []
  # chromecasts:
  #   - name: "Bedroom TV"
  #     ip: "192.168.x.x"
  #   - name: "Living Room"
  #     ip: "192.168.x.y"

# -- Persistence for playlists and devices
persistence:
  # -- Enable persistent storage (requires a PVC-capable storage class)
  enabled: false
  # -- Storage size
  size: 100Mi
  # -- Storage class (leave empty to use cluster default)
  storageClass: ""

# -- Extra secrets to inject (arbitrary key/value, mounted as env vars)
secrets: {}

registry:
  # -- Create a ghcr.io image pull secret automatically
  create: false
  # -- GitHub username
  username: ""
  # -- GitHub personal access token with read:packages scope
  password: ""
