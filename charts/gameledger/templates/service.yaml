apiVersion: v1
kind: Service
metadata:
  name: {{ include "gameledger.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gameledger.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "gameledger.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
