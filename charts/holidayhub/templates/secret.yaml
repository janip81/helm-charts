{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "holidayhub.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "holidayhub.labels" . | nindent 4 }}
type: Opaque
stringData:
  NEXTAUTH_SECRET: {{ .Values.secretEnv.NEXTAUTH_SECRET | quote }}
  {{- if not .Values.cnpg.enabled }}
  DATABASE_URL: {{ .Values.secretEnv.DATABASE_URL | default "" | quote }}
  {{- end }}
{{- end }}
