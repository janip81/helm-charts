apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "holidayhub.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "holidayhub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- if .Values.persistence.enabled }}
    type: Recreate
    {{- else }}
    type: RollingUpdate
    {{- end }}
  selector:
    matchLabels:
      {{- include "holidayhub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "holidayhub.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - node /app/node_modules/prisma/build/index.js migrate deploy --schema=/app/prisma/schema.prisma
          envFrom:
            - configMapRef:
                name: {{ include "holidayhub.fullname" . }}-config
            - secretRef:
                name: {{ include "holidayhub.fullname" . }}-secret
          {{- if .Values.cnpg.enabled }}
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "holidayhub.fullname" . }}-pg-app
                  key: password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.cnpg.owner }}:$(DB_PASSWORD)@{{ include "holidayhub.fullname" . }}-pg-rw:5432/{{ .Values.cnpg.database }}"
          {{- end }}
      containers:
        - name: holidayhub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "holidayhub.fullname" . }}-config
            - secretRef:
                name: {{ include "holidayhub.fullname" . }}-secret
          {{- if or .Values.cnpg.enabled .Values.redis.enabled }}
          env:
            {{- if .Values.cnpg.enabled }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "holidayhub.fullname" . }}-pg-app
                  key: password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.cnpg.owner }}:$(DB_PASSWORD)@{{ include "holidayhub.fullname" . }}-pg-rw:5432/{{ .Values.cnpg.database }}"
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.passwordSecret.name }}
                  key: {{ .Values.redis.passwordSecret.key }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.redis.host }}:{{ .Values.redis.port }}/{{ .Values.redis.db }}"
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- if .Values.persistence.enabled }}
            - name: uploads
              mountPath: /app/uploads
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- if .Values.persistence.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "holidayhub.fullname" . }}-uploads
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
